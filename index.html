<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо Фортуны</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎡 Колесо Фортуны</h1>

    <div class="container">
        <div class="controls">
            <label>Список участников</label>
            <textarea id="participantsInput" placeholder="Иван&#10;Мария">Участник 1&#10;Участник 2&#10;Участник 3&#10;Участник 4</textarea>
            <button id="spinBtn">КРУТИТЬ КОЛЕСО</button>
        </div>

        <div class="wheel-wrapper">
            <div class="arrow"></div>
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>

        <div class="history">
            <h3>Победители:</h3>
            <ul id="winnersList"></ul>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
