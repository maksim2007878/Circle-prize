<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Колесо Фортуны</title>
        <link rel="stylesheet" href="styles/style.css" />
    </head>
    <body>
        <!-- Окно победителя -->
        <div id="winnerOverlay" class="overlay">
            <div class="winner-card">
                <h2>🎉 Победитель! 🎉</h2>
                <div id="winnerNameDisplay"></div>
                <!-- Исправлено: используем стандартный button с классом для стилей -->
                <button id="closeBtn" class="close-btn">Поздравляю</button>
            </div>
        </div>

        <h1>🎡 Розыгрыш призов</h1>

        <div class="container">
            <!-- Блок управления -->
            <div class="controls">
                <label>Список участников</label>
                <textarea id="participantsInput" placeholder="Введите имена...">
Участник 1
Участник 2
Участник 3
Участник 4</textarea
                >
                <button id="spinBtn">КРУТИТЬ КОЛЕСО</button>
            </div>

            <!-- Визуализация колеса -->
            <div class="wheel-wrapper">
                <div class="arrow"></div>
                <canvas id="canvas" width="400" height="400"></canvas>
            </div>

            <!-- История -->
            <div class="history">
                <h3>Победители:</h3>
                <ul id="winnersList"></ul>

                <button
                    id="clearHistoryBtn"
                    style="
                        margin-top: 5px;
                        padding: 5px;
                        font-size: 12px;
                        background: #e74c3c;
                    "
                >
                    Очистить файл истории
                </button>
            </div>
        </div>

        <script src="src/index.js"></script>
    </body>
</html>
